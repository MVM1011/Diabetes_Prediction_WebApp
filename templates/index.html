<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e3a8a);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .card-header{
            background:#2563eb;
            color:white;
            text-align:center;
            border-radius:20px 20px 0 0 !important;
            padding:20px;
        }

        .btn-custom{
            background:#2563eb;
            color:white;
            width:100%;
            font-size:18px;
            font-weight:bold;
        }

        .btn-custom:hover{
            background:#1d4ed8;
            color:white;
        }

        h1{
            font-weight:bold;
        }

        .result-box{
            margin-top:20px;
            padding:15px;
            border-radius:10px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .healthy{
            background:#d1fae5;
            color:#065f46;
        }

        .diabetic{
            background:#fee2e2;
            color:#991b1b;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card">

                <div class="card-header">
                    <h1>🩺 Diabetes Prediction System</h1>
                    <p class="mb-0">Machine Learning Based Health Assessment</p>
                </div>

                <div class="card-body p-4">

                    <form action="/predict" method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Pregnancies</label>
                                <input type="number" class="form-control" name="pregnancies" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Glucose</label>
                                <input type="number" class="form-control" name="glucose" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Blood Pressure</label>
                                <input type="number" class="form-control" name="blood_pressure" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Skin Thickness</label>
                                <input type="number" class="form-control" name="skin_thickness" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Insulin</label>
                                <input type="number" class="form-control" name="insulin" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">BMI</label>
                                <input type="number" step="0.1" class="form-control" name="bmi" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Diabetes Pedigree Function</label>
                                <input type="number" step="0.001" class="form-control" name="pedigree" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" name="age" required>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-custom">
                            Predict Diabetes
                        </button>

                    </form>

                    {% if result %}

                    {% if result == "Diabetic" %}
                    <div class="result-box diabetic">
                        ⚠️ Prediction Result: {{ result }}
                    </div>
                    {% else %}
                    <div class="result-box healthy">
                        ✅ Prediction Result: {{ result }}
                    </div>
                    {% endif %}

                    {% endif %}

                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
